<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none" aria-hidden="true">
  <!-- Large search circle -->
  <circle cx="108" cy="84" r="52" fill="#1c1f2b" stroke="#2e3347" stroke-width="2"/>
  <circle cx="108" cy="84" r="44" fill="none" stroke="#6c8eff" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Question mark body -->
  <path d="M100 72 Q100 62 108 62 Q116 62 116 70 Q116 76 108 80 L108 86"
        stroke="#6c8eff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="108" cy="96" r="2.5" fill="#6c8eff"/>

  <!-- Search handle -->
  <line x1="149" y1="125" x2="172" y2="150" stroke="#6c8eff" stroke-width="4" stroke-linecap="round"/>
  <!-- Broken joint crosshatch -->
  <line x1="155" y1="119" x2="161" y2="131" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="161" y1="119" x2="155" y2="131" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- "4 _ 4" digit hints as abstract shapes -->
  <!-- Left 4 -->
  <path d="M30 70 L30 96 M18 82 L38 82 M38 70 L38 96" stroke="#2e3347" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right 4 -->
  <path d="M178 70 L178 96 M166 82 L186 82 M186 70 L186 96" stroke="#2e3347" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Scattered dots (lost signal) -->
  <circle cx="56" cy="38" r="2.5" fill="#2e3347" fill-opacity="0.6"/>
  <circle cx="168" cy="28" r="3" fill="#2e3347" fill-opacity="0.5"/>
  <circle cx="196" cy="56" r="2" fill="#2e3347" fill-opacity="0.4"/>
  <circle cx="36" cy="130" r="2" fill="#2e3347" fill-opacity="0.4"/>
  <circle cx="200" cy="140" r="2.5" fill="#2e3347" fill-opacity="0.45"/>
</svg>
